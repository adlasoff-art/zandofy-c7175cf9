- name: Deploy to Staging
        if: github.ref == 'refs/heads/develop'
        run: |
          # On vérifie si la variable est bien chargée
          if [ -z "$PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_ID secret is not set"
            exit 1
          fi
          # Ajout du mot de passe et du flag --yes pour éviter l'interactivité
          supabase link --project-ref "$PROJECT_REF" --password "$DB_PASSWORD" --yes
          supabase functions deploy --no-verify-jwt
        working-directory: frontend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }} # Ajoutez ce secret sur GitHub

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -z "$PROJECT_REF" ]; then
            echo "::error::PRODUCTION_PROJECT_ID secret is not set"
            exit 1
          fi
          supabase link --project-ref "$PROJECT_REF" --password "$DB_PASSWORD" --yes
          supabase functions deploy --no-verify-jwt
        working-directory: frontend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.PRODUCTION_PROJECT_ID }}
          DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }} # Ajoutez ce secret sur GitHub