name: Deploy Edge Functions (Multi-Env)

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/supabase/functions/**"
      - "frontend/supabase/config.toml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ── Develop ──
      - name: Deploy to Staging (develop)
        if: github.ref == 'refs/heads/develop'
        working-directory: frontend
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "▶ Environnement : STAGING (develop)"
          if [ -z "$PROJECT_REF" ]; then echo "❌ SUPABASE_PROJECT_ID est vide (ni variable ni secret)"; exit 1; fi
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then echo "❌ SUPABASE_ACCESS_TOKEN est vide"; exit 1; fi
          supabase functions deploy --project-ref "$PROJECT_REF" --no-verify-jwt

      # ── Main ──
      - name: Deploy to Production (main)
        if: github.ref == 'refs/heads/main'
        working-directory: frontend
        env:
          PROJECT_REF: ${{ secrets.PRODUCTION_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "▶ Environnement : PRODUCTION (main)"
          if [ -z "$PROJECT_REF" ]; then echo "❌ PRODUCTION_PROJECT_ID est vide (ni variable ni secret)"; exit 1; fi
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then echo "❌ SUPABASE_ACCESS_TOKEN est vide"; exit 1; fi
          supabase functions deploy --project-ref "$PROJECT_REF" --no-verify-jwt
