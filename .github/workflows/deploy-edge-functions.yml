name: Deploy Edge Functions (Multi-Env)

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/supabase/functions/**"
      - "frontend/supabase/config.toml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy to Staging
        if: github.ref == 'refs/heads/develop'
        working-directory: frontend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "Vérification du dossier courant..."
          ls -R supabase/functions | head -n 5
          supabase link --project-ref "$PROJECT_REF" --password '$DB_PASSWORD' --yes
          supabase functions deploy --no-verify-jwt

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        working-directory: frontend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.PRODUCTION_PROJECT_ID }}
          DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
        run: |
          echo "Vérification du dossier courant..."
          ls -R supabase/functions | head -n 5
          supabase link --project-ref "$PROJECT_REF" --password '$DB_PASSWORD' --yes
          supabase functions deploy --no-verify-jwt
