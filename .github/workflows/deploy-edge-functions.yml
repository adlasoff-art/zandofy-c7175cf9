name: Deploy Edge Functions (Multi-Env)

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/supabase/functions/**"
      - "frontend/supabase/config.toml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy
        working-directory: frontend
        env:
          # Ici, on choisit les bonnes valeurs selon la branche
          PROJECT_ID: ${{ github.ref == 'refs/heads/main' && secrets.PRODUCTION_PROJECT_ID || secrets.SUPABASE_PROJECT_ID }}
          DB_PASS: ${{ github.ref == 'refs/heads/main' && secrets.PRODUCTION_DB_PASSWORD || secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$PROJECT_ID" ]; then
            echo "ERREUR : L'ID du projet est vide. Vérifiez vos Secrets GitHub."
            exit 1
          fi
          # On lie le projet et on déploie
          supabase link --project-ref "$PROJECT_ID" --password "$DB_PASS" --yes
          supabase functions deploy --all --no-verify-jwt
