name: Deploy Edge Functions (Multi-Env)

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/supabase/functions/**'
      - 'frontend/supabase/config.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # --- LOGIQUE POUR STAGING (Branche develop) ---
      - name: Deploy to Staging
        if: github.ref == 'refs/heads/develop'
        run: |
          supabase link --project-ref ${{ secrets.STAGING_PROJECT_ID }}
          supabase functions deploy --no-verify-jwt
        working-directory: frontend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # --- LOGIQUE POUR PRODUCTION (Branche main) ---
      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          supabase link --project-ref ${{ secrets.PRODUCTION_PROJECT_ID }}
          supabase functions deploy --no-verify-jwt
        working-directory: frontend
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
