<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />
  <title>Zandofy — Mode Élégante &amp; Accessible</title>
  <meta name="description" content="Découvrez Zandofy : mode premium à prix accessibles. Robes, hauts, accessoires et plus. Expédition et Livraison rapide en Afrique.">
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Zandofy" />

  <!-- PWA Meta -->
  <meta name="theme-color" content="#1a5c2e" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f1a12" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zandofy" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Preconnect: prod Supabase + Google Fonts + Unsplash (critical) -->
  <link rel="preconnect" href="https://vpttoqojmiqxgudknyxf.supabase.co" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin />

  <!-- LCP image preload — keep in sync with the first active hero_slide banner.
       If you swap the hero image in the admin, update this URL too. -->
  <link rel="preload" as="image" fetchpriority="high"
        href="https://images.unsplash.com/photo-1468495244123-6c6c332eeece?w=900&h=450&fit=crop" />

  <!-- Critical font: Inter (default) — render-blocking minimal weights -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />

  <!-- Optional fonts (admin-switchable): loaded async, no render block -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" /></noscript>

  <!-- Canonical (default home; per-page React overrides via SEOHead) -->
  <link rel="canonical" href="https://zandofy.com/" />

  <!-- OG / Twitter -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://zandofy.com/" />
  <meta property="og:site_name" content="Zandofy" />
  <meta property="og:locale" content="fr_FR" />
  <meta property="og:image" content="https://zandofy.com/og-default.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Zandofy — Marketplace mode sino-africaine" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@Zandofy" />
  <meta name="twitter:image" content="https://zandofy.com/og-default.jpg" />
  <meta property="og:title" content="Zandofy">
  <meta name="twitter:title" content="Zandofy">
  <meta property="og:description" content="Zandofy — marketplace en ligne.">
  <meta name="twitter:description" content="Zandofy — marketplace en ligne.">

  <!-- JSON-LD Organization + WebSite (sitelinks searchbox) — static for crawlers -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://zandofy.com/#organization",
        "name": "Zandofy",
        "url": "https://zandofy.com/",
        "logo": "https://zandofy.com/icons/icon-512.png",
        "image": "https://zandofy.com/og-default.jpg",
        "description": "Marketplace sino-africaine de mode premium à prix accessibles. Robes, hauts, accessoires et plus. Expédition et livraison rapide en Afrique.",
        "sameAs": [
          "https://www.facebook.com/zandofy",
          "https://www.instagram.com/zandofy",
          "https://twitter.com/zandofy"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "availableLanguage": ["French", "English"]
        }
      },
      {
        "@type": "WebSite",
        "@id": "https://zandofy.com/#website",
        "url": "https://zandofy.com/",
        "name": "Zandofy",
        "publisher": { "@id": "https://zandofy.com/#organization" },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://zandofy.com/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    ]
  }
  </script>

  <!-- Security Headers (X-Frame-Options removed: must be set via HTTP header, see vercel.json) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(self)">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://images.unsplash.com https://*.r2.dev https://*.cloudflare.com https://*.googleusercontent.com https://*.tile.openstreetmap.org https://www.googletagmanager.com https://www.google-analytics.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.ipify.org https://ipapi.co https://pay.keccel.com https://accounts.google.com https://*.lovableproject.com https://*.lovable.app https://*.zandofy.com https://www.google-analytics.com https://www.googletagmanager.com https://cloudflareinsights.com; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self';">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
