# =============================================================================
# Zandofy — Configuration Nginx pour SPA (Single Page Application)
# Utilisé à l'intérieur du conteneur Docker frontend
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # --- Headers de sécurité ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # --- Assets statiques avec cache long (JS, CSS, images hashés par Vite) ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Favicons, icons, manifest ---
    location ~* \.(ico|png|webp|svg|webmanifest|manifest\.json)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # --- Fonts ---
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # --- Service Worker (jamais cacher) ---
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # --- SPA Fallback : toutes les routes renvoient vers index.html ---
    location / {
        try_files $uri $uri/ /index.html;

        # Ne pas cacher index.html (pour les mises à jour)
        location = /index.html {
            expires off;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # --- Bloquer l'accès aux fichiers sensibles ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # --- Taille maximale des requêtes ---
    client_max_body_size 10M;

    # --- Pages d'erreur ---
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
